<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Windshield shape -->
  <path d="M 140 340 Q 160 160, 256 140 Q 352 160, 372 340 Z" 
        fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Reflection line -->
  <path d="M 200 280 Q 230 200, 280 190" 
        fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Letters PC -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#f1f5f9" letter-spacing="8">PC</text>
</svg>
